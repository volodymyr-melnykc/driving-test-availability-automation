name: Check driving test slots

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

concurrency:
  group: slot-check
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Decrypt cookie store
        env:
          COOKIE_KEY: ${{ secrets.COOKIE_KEY }}
        run: |
          if [ -f cookie_store.enc ]; then
            openssl enc -d -aes-256-cbc -pbkdf2 -pass env:COOKIE_KEY \
              -in cookie_store.enc -out cookie_store.json
          fi

      - name: Check slots
        env:
          TRV_COOKIE: ${{ secrets.TRV_COOKIE }}
          TRV_SSN: ${{ secrets.TRV_SSN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 check_slots.py

      - name: Encrypt cookie store
        if: always()
        env:
          COOKIE_KEY: ${{ secrets.COOKIE_KEY }}
        run: |
          if [ -f cookie_store.json ]; then
            openssl enc -aes-256-cbc -pbkdf2 -pass env:COOKIE_KEY \
              -in cookie_store.json -out cookie_store.enc
            rm cookie_store.json
          fi

      - name: Commit report and state
        if: always()
        run: |
          git config user.name "slot-checker[bot]"
          git config user.email "slot-checker@users.noreply.github.com"
          # These files are regenerated every run; latest run wins. Never merge —
          # cookie_store.enc is binary and would always conflict on rebase.
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git reset --soft origin/main
            git add REPORT.md state.json cookie_store.enc
            git diff --cached --quiet && { echo "No changes to commit"; exit 0; }
            git commit -m "Update availability report [skip ci]"
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Push rejected (attempt $attempt), refetching and retrying..."
            sleep 5
          done
          echo "Failed to push after 5 attempts" >&2
          exit 1

# schedule re-registered 2026-06-10
